name: tests.yml
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - 'main'

jobs:
  api-tests:
    runs-on: ubuntu-latest

    env:
      AUTH_DB_USER: ${{ secrets.AUTH_DB_USER }}
      AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
      AUTH_DB_NAME: strg_users_db
      SEED_SUPERADMIN_EMAIL: ${{ secrets.SEED_SUPERADMIN_EMAIL }}
      SEED_SUPERADMIN_PASSWORD: ${{ secrets.SEED_SUPERADMIN_PASSWORD }}

    steps:
      - name: Checkout tests
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: Metaf-p/StoreSystem-app
          path: app

      - name: Validate docker compose
        working-directory: app
        run: docker compose config

      - name: Start application
        working-directory: app
        run: docker compose up -d --build

      - name: Wait for auth service
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8001/docs > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Auth service did not become ready in time"
          exit 1

      - name: Run API tests
        run: ./mvnw clean test -Dgroups=api

      - name: Save reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Save app logs
        if: always()
        working-directory: app
        run: docker compose logs --no-color > docker-compose.log

      - name: Upload app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: app/docker-compose.log

      - name: Stop application
        if: always()
        working-directory: app
        run: docker compose down -v

      - name: Fix docker data permissions
        if: always()
        run: sudo rm -rf app/docker-data
